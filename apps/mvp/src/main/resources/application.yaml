spring:
  application:
    name: mvp
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  session:
    jdbc:
      initialize-schema: never

server:
  port: 8081
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: "*"
      #Damit die Healhfunktionen im Adminpanel wieder gehen 
      cors:
        allowed-origins: 
          - "http://localhost:3000"
          - "http://localhost:5173"
        allowed-methods: "GET, OPTIONS"
        allowed-headers: "*"
        allow-credentials: true
  endpoint:
    health:
      show-details: always

app:
  health:
    required-tables:
      - product
      - session