name: Deploy Backend

on:
  release:
    types: [ published ]
  workflow_dispatch:

env:
  GHCR_IMAGE: "ghcr.io/${{ github.repository }}/backend:latest"
  CONTAINER_NAME: "Backend-Container"
  INTERNAL_PORT: 8081
  EXTERNAL_PORT: 8081

jobs:
  deploy-to-testing:
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "just-a-placeholder-so-we-dont-get-errors"

      - name: check ssh key existance
        run: |
          cd ~/.ssh/
          ls -A

      - name: Deploy Backend (Testing)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
            echo '--- START BACKEND DEPLOYMENT ---'
            
            echo '> 1. Prüfe Environment Variablen aus GitHub Secrets:'
            echo '  - URL: ${{ secrets.SPRING_DATASOURCE_URL }}'
            echo '  - USER: ${{ secrets.SPRING_DATASOURCE_USERNAME }}'
            echo '  - PASS: [WIRD AUS SICHERHEITSGRÜNDEN NICHT GELOGGT]'
            
            echo '> 2. Ziehe aktuelles Docker Image...'
            docker pull $GHCR_IMAGE
            
            echo '> 3. Räume alte Container auf...'
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            
            echo '> 4. Starte neuen Container im Netzwerk [asta-network]...'
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network asta-network \
              -p ${{ env.EXTERNAL_PORT }}:${{ env.INTERNAL_PORT }} \
              -e SPRING_DATASOURCE_URL='${{ secrets.SPRING_DATASOURCE_URL }}' \
              -e SPRING_DATASOURCE_USERNAME='${{ secrets.SPRING_DATASOURCE_USERNAME }}' \
              -e SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}' \
              $GHCR_IMAGE
              
            echo '> 5. Überprüfe Netzwerk-Status...'
            docker network inspect asta-network | grep -E '\"Name\": \"${{ env.CONTAINER_NAME }}\"|\"Name\": \"database\"' || echo 'Fehler beim Netzwerk-Matching!'
            
            echo '--- DEPLOYMENT SCRIPT ABGESCHLOSSEN ---'
          "
      - name: Simuliere Backend-Tests
        run: |
          echo "Testing: Prüfe, ob Backend-Container läuft..."
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
            docker ps | grep ${{ env.CONTAINER_NAME }} || { echo 'Backend-Container läuft nicht!'; exit 1; }
          "

  deploy-to-production:
    needs: deploy-to-testing
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "just-a-placeholder-so-we-dont-get-errors"

      - name: Deploy Backend (Production)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
            echo '--- START BACKEND DEPLOYMENT ---'
            
            echo '> 1. Prüfe Environment Variablen aus GitHub Secrets:'
            echo '  - URL: ${{ secrets.SPRING_DATASOURCE_URL }}'
            echo '  - USER: ${{ secrets.SPRING_DATASOURCE_USERNAME }}'
            echo '  - PASS: [WIRD AUS SICHERHEITSGRÜNDEN NICHT GELOGGT]'
            
            echo '> 2. Ziehe aktuelles Docker Image...'
            docker pull $GHCR_IMAGE
            
            echo '> 3. Räume alte Container auf...'
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            
            echo '> 4. Starte neuen Container im Netzwerk [asta-network]...'
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network asta-network \
              -p ${{ env.EXTERNAL_PORT }}:${{ env.INTERNAL_PORT }} \
              -e SPRING_DATASOURCE_URL='${{ secrets.SPRING_DATASOURCE_URL }}' \
              -e SPRING_DATASOURCE_USERNAME='${{ secrets.SPRING_DATASOURCE_USERNAME }}' \
              -e SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}' \
              $GHCR_IMAGE
              
            echo '> 5. Überprüfe Netzwerk-Status...'
            docker network inspect asta-network | grep -E '\"Name\": \"${{ env.CONTAINER_NAME }}\"|\"Name\": \"database\"' || echo 'Fehler beim Netzwerk-Matching!'
            
            echo '--- DEPLOYMENT SCRIPT ABGESCHLOSSEN ---'
          "
