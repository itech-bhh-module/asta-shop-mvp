version: "3.8"
services:
  database:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  backend:
    image: ghcr.io/itech-bhh-module/asta-shop-mvp/backend:${TAG}
    build:
      context: ./apps/mvp
      dockerfile: Dockerfile
    container_name: backend-container
    ports:
      - "8081:8081"
    restart: unless-stopped

  frontend:
    image: ghcr.io/itech-bhh-module/asta-shop-mvp/frontend:${TAG}
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: frontend-container
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
